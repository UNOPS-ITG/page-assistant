<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Afro hair -->
  <circle cx="22" cy="17" r="18" fill="#2D2226"/>
  <ellipse cx="9" cy="11" rx="9" ry="10" fill="#2D2226"/>
  <ellipse cx="36" cy="11" rx="9" ry="10" fill="#2D2226"/>
  <ellipse cx="22" cy="6" rx="13" ry="7" fill="#3A2C30"/>
  <ellipse cx="11" cy="8" rx="7" ry="8" fill="#3A2C30"/>
  <ellipse cx="34" cy="8" rx="7" ry="8" fill="#3A2C30"/>

  <!-- Face -->
  <ellipse cx="22" cy="23" rx="11.5" ry="13" fill="#7A4E2D"/>

  <!-- Headphone band -->
  <path d="M6 16 Q6 4 22 2 Q38 4 38 16" stroke="#E8531F" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Left ear cup -->
  <rect x="1" y="13" width="8" height="11" rx="4" fill="#E8531F"/>
  <rect x="2.2" y="14.8" width="5.6" height="7.4" rx="2.8" fill="#FF6B2E"/>

  <!-- Right ear cup -->
  <rect x="35" y="13" width="8" height="11" rx="4" fill="#E8531F"/>
  <rect x="36.2" y="14.8" width="5.6" height="7.4" rx="2.8" fill="#FF6B2E"/>

  <!-- Sunglasses frame -->
  <path d="M16.5 21 Q22 23.5 27.5 21" stroke="#E8531F" stroke-width="2" fill="none"/>

  <!-- Left lens -->
  <circle cx="15" cy="21" r="5.5" fill="#E8531F"/>
  <circle cx="15" cy="21" r="4.2" fill="#FF8C42"/>
  <ellipse cx="13.8" cy="20" rx="1.8" ry="1.2" fill="#FFB674" opacity="0.5"/>

  <!-- Right lens -->
  <circle cx="29" cy="21" r="5.5" fill="#E8531F"/>
  <circle cx="29" cy="21" r="4.2" fill="#FF8C42"/>
  <ellipse cx="27.8" cy="20" rx="1.8" ry="1.2" fill="#FFB674" opacity="0.5"/>

  <!-- Smile -->
  <path d="M18 29 Q22 33 26 29" stroke="#5A3520" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Speech/chat bubble with typing dots -->
  <rect x="30" y="35" width="17" height="10" rx="5" fill="white" stroke="#E8531F" stroke-width="1.4"/>
  <path d="M34 45 L32 48 L36 45" fill="white" stroke="#E8531F" stroke-width="1.4" stroke-linejoin="round"/>
  <path d="M34 45 L36 45" stroke="white" stroke-width="2"/>
  <circle cx="35.5" cy="40" r="1.5" fill="#E8531F"/>
  <circle cx="38.5" cy="40" r="1.5" fill="#E8531F"/>
  <circle cx="41.5" cy="40" r="1.5" fill="#E8531F"/>
</svg>
